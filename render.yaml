services:
  - type: web
    name: my-voice-agent
    runtime: node
    plan: free
    branch: main
    buildCommand: corepack prepare pnpm@9.15.9 --activate && corepack pnpm install --frozen-lockfile && corepack pnpm build
    startCommand: corepack pnpm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_MESSAGE_THREAD_ID
        sync: false
      - key: LIVEKIT_AGENT
        sync: false
